version: '3.8'

services:
  marketing-assistant:
    build: 
      context: .
      dockerfile: Dockerfile
    image: kiamol/marketing-assistant
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped